<article class="corollary theorem-like"><h4 class="heading">
<span class="type">Corollary</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">1.5.9</span><span class="period heading-divison-mark heading-divison-mark__period">.</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="title">Square roots of <span class="process-math">\(-1\)</span> modulo <span class="process-math">\(p\)</span>.</span>
</h4>
<div class="para logical">
<div class="para">Let <span class="process-math">\(p\)</span> be an odd prime. We have</div>
<div class="displaymath process-math">
\begin{align}
\qr{-1}{p} \amp =(-1)^{(p-1)/2}\tag{1.5.2}\\
\amp =\begin{cases}
1\amp \text{if } p\equiv 1\pmod 4 \\
-1\amp \text{if } p\equiv 3\pmod 4
\text{.}\end{cases}\tag{1.5.3}
\end{align}
</div>

<article class="corollary theorem-like"><h3 class="heading">
<span class="type">Corollary</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">1.7.2</span><span class="period heading-divison-mark heading-divison-mark__period">.</span>
</h3>
<div class="para logical">
<div class="para">Let <span class="process-math">\(p\)</span> and <span class="process-math">\(q\)</span> be distinct odd primes.</div>
<div class="displaymath process-math">
\begin{align}
\qr{p}{q} \amp = \begin{cases}
\qr{q}{p} \amp \text{if } p\equiv 1\pmod 4 \text{ or } q\equiv 1\pmod 4 \\
-\qr{q}{p} \amp \text{if } p\equiv q\equiv -1\pmod 4
\text{.}\end{cases}\tag{1.7.2}
\end{align}
</div>

<span class="type">Definition</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">1.10.16</span><span class="period heading-divison-mark heading-divison-mark__period">.</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="title">Complex modulus.</span>
</h4>
<div class="para logical">
<div class="para">The <dfn class="terminology">modulus</dfn> (or <dfn class="terminology">absolute value</dfn>) of a complex number <span class="process-math">\(z=a+ib\text{,}\)</span> denoted <span class="process-math">\(\abs{z}\text{,}\)</span> is defined as</div>
<div class="displaymath process-math">
\begin{equation*}
\abs{z}=\sqrt{a^2+b^2}\text{.}
\end{equation*}
</div>
<div class="para">If <span class="process-math">\(\abs{z}=1\text{,}\)</span> we say that <span class="process-math">\(z\)</span> has <dfn class="terminology">unit length</dfn>.</div>

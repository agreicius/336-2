<div class="para logical">
<div class="para">The units of <span class="process-math">\(\Z[i]\)</span> are <span class="process-math">\(\pm 1\)</span> and <span class="process-math">\(\pm i\text{.}\)</span> In other words,</div>

\end{align}
</div>

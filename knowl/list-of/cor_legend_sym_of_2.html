<article class="corollary theorem-like"><h3 class="heading">
<span class="type">Corollary</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">1.6.6</span><span class="period heading-divison-mark heading-divison-mark__period">.</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="title">Formula for <span class="process-math">\(\qr{2}{p}\)</span>.</span>
</h3>
<div class="para logical">
<div class="para">Let <span class="process-math">\(p\)</span> be an odd prime. We have</div>
<div class="displaymath process-math">
\begin{equation}
\qr{2}{p}=\begin{cases}
1 \amp \text{if } p\equiv \pm 1 \pmod 8 \\
-1 \amp \text{if } p\equiv \pm 3 \pmod 8
\text{.}\end{cases}\tag{1.6.7}
\end{equation}
</div>

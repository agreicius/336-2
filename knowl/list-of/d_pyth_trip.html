</h4>
<div class="para">A <dfn class="terminology">Pythagorean triple</dfn> is a triple <span class="process-math">\((a,b,c)\)</span> of positive integers satisfying the Pythagorean equation <span class="process-math">\(x^2+y^2=z^2\text{.}\)</span><div class="autopermalink" data-description="Paragraph"><a href="#d_pyth_trip-2-1" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div> <div class="para">A <dfn class="terminology">primitive Pythagorean triple</dfn> is a Pythagorean triple <span class="process-math">\((a,b,c)\)</span> that further satisfies <span class="process-math">\(\gcd(a,b,c)=1\text{.}\)</span><div class="autopermalink" data-description="Paragraph"><a href="#d_pyth_trip-2-2" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>

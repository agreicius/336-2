<article class="theorem theorem-like"><h3 class="heading">
<span class="type">Theorem</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">1.7.1</span><span class="period heading-divison-mark heading-divison-mark__period">.</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="title">Law of quadratic reciprocity.</span>
</h3>
<div class="para logical">
<div class="para">Let <span class="process-math">\(p\)</span> and <span class="process-math">\(q\)</span> be distinct odd primes. We have</div>
<div class="displaymath process-math">
\begin{align}
\qr{p}{q} \amp = (-1)^{\frac{p-1}{2} \cdot \frac{q-1}{2}} \qr{q}{p} \text{.}\tag{1.7.1}
\end{align}
</div>

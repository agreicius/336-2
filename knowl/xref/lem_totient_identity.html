<span class="type">Lemma</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">1.3.5</span><span class="period heading-divison-mark heading-divison-mark__period">.</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="title">Totient function identity.</span>
</h4>
<div class="para logical">
<div class="para">Let <span class="process-math">\(n\)</span> be a positive integer, and let <span class="process-math">\(\phi\)</span> be the Euler totient function.</div>
<div class="displaymath process-math">
\begin{align}
\sum_{d\mid n}\phi(d) \amp = n \text{.}\tag{1.3.6}
\end{align}
</div>

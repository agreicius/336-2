<div class="para logical">
<div class="para">Let <span class="process-math">\(p\)</span> be a prime integer. All nonzero elements of <span class="process-math">\(\Z/p\Z\)</span> are invertible: i.e.,</div>
<div class="displaymath process-math">

(\Z/p\Z)^* \amp = \Z/p\Z-\{0\} \text{.}\tag{1.1.12}
\end{align}
</div>
